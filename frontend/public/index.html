        <!-- LCP optimization: preload the two Scandia woff2 files the
             homepage wordmark depends on. Preload starts the font download
             in parallel with the Typekit stylesheet, so the font is
             (usually) ready by the time the CSS finishes parsing — this
             cuts multiple seconds off LCP for typography-first pages.
             fvd=n7 = Scandia Web 700 normal (browser synthesizes 800 from
             this for the wordmark H1). fvd=i7 = Scandia Web 700 italic
             (used for the steel-blue accent phrases in H1/H2). -->
        <link rel="preload" as="font" type="font/woff2" crossorigin
              href="https://use.typekit.net/af/04b7f1/00000000000000007735dd24/31/l?primer=7cdcb44be4a7db8877ffa5c0007b8dd865b3bbc383831fe2ea177f62257a9191&fvd=n7&v=3" />
        <link rel="preload" as="font" type="font/woff2" crossorigin
              href="https://use.typekit.net/af/29e987/00000000000000007735f528/31/l?primer=7cdcb44be4a7db8877ffa5c0007b8dd865b3bbc383831fe2ea177f62257a9191&fvd=i7&v=3" />
        <!-- Cormorant Garamond italic — a VARIABLE font: one woff2 covers
             every italic weight (300–500). It renders the hero subhead and
             the serif accents, i.e. frequently the LCP element. Without a
             preload it's only discovered after the async Google Fonts CSS
             loads and then competes with the JS bundle on slow links —
             the late swap repaint re-registered LCP seconds after FCP.
             If Google bumps the font version (v21 → v22) this URL keeps
             working but stops matching what the stylesheet requests —
             re-derive it via:
             curl -sA "Mozilla/5.0 ... Chrome/120" "https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@1,400&display=swap" -->
        <link rel="preload" as="font" type="font/woff2" crossorigin
              href="https://fonts.gstatic.com/s/cormorantgaramond/v21/co3ZmX5slCNuHLi8bLeY9MK7whWMhyjYrEtImSo.woff2" />

        <!-- Adobe Typekit — Scandia. Loaded async (same preload/onload
             pattern as Google Fonts below) so NO cross-origin stylesheet
             blocks first paint — kiu8ndx.css also chains a second
             render-blocking @import to p.typekit.net when loaded
             synchronously, which double-charged slow connections. The two
             woff2 preloads above still start the font downloads at HTML
             parse time, so once this CSS applies, Scandia is ready and
             the swap from the Lexend Deca fallback is near-instant.
             ?display=swap keeps font-display:swap in Typekit's @font-face
             rules — text is never invisible while fonts load. -->
        <link
            rel="preload"
            as="style"
            href="https://use.typekit.net/kiu8ndx.css?display=swap"
            onload="this.onload=null;this.rel='stylesheet'"
        />
        <noscript>
            <link rel="stylesheet" href="https://use.typekit.net/kiu8ndx.css?display=swap" />
        </noscript>

        <!-- Google Fonts loaded via media="print" swap-to-all trick so they
             do NOT block first paint. Cormorant Garamond (serif italic
             accents) and Lexend Deca (fallback for the wordmark before
             Scandia arrives — shares Scandia's double-story 'a' so the
             swap is visually seamless) already have &display=swap so
             their @font-face uses fallback text immediately; deferring
             the STYLESHEET itself removes two additional render-blocking
             requests from the critical path. -->
        <link
            rel="preload"
            as="style"
            href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300;1,400;1,500&display=swap"
