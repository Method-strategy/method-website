[build]
  # Repo is monorepo-style. React app lives in /frontend.
  base    = "frontend"
  # Full production build + strip-emergent + per-route OG meta + STATIC SITE
  # GENERATION (renders every route's React tree to HTML at build time) +
  # sitemap.xml + writing/rss.xml. The SSG step is what makes the deploy
  # crawlable by non-JS clients (LinkedIn, Perplexity, Claude, Google AI
  # Overview) — see scripts/prerender-ssg.js.
  command = "yarn install --frozen-lockfile && yarn build && node scripts/strip-emergent.js && node scripts/inline-google-fonts.js && node scripts/generate-og-cards.js && node scripts/prerender-og.js && node scripts/prerender-ssg.js && node scripts/generate-sitemap.js && node scripts/generate-rss.js && node scripts/indexnow-ping.js"
  publish = "build"
  # Always build on every push. Without this, Netlify auto-cancels deploys
  # when it sees no diff inside base=frontend (which happens when commits
  # only touch root-level files or re-push identical content).
  ignore  = "exit 1"

[build.environment]
  NODE_VERSION            = "20"
  # CRA/craco: don't fail the build on ESLint warnings-treated-as-errors.
  CI                      = "false"
  DISABLE_ESLINT_PLUGIN   = "true"
  ESLINT_NO_DEV_ERRORS    = "true"
  TSC_COMPILE_ON_ERROR    = "true"
  # Support React 19 peer deps if any tool falls back to npm.
  NPM_FLAGS               = "--legacy-peer-deps"
  # Skip source maps in production.
  GENERATE_SOURCEMAP      = "false"
  # Skip the Netlify Next.js plugin auto-attach on this CRA project.
  NETLIFY_USE_YARN        = "true"
  # Ensure devDependencies get installed. Belt-and-braces — Netlify's
  # default already installs them for yarn projects, but we set this
  # explicitly so the build step (which uses esbuild via a post-build
  # script) never breaks silently.
  NPM_CONFIG_PRODUCTION   = "false"
  YARN_PRODUCTION         = "false"

# SPA fallback lives in public/_redirects (copied to build/_redirects by
# CRA) so it's colocated with the site rather than split across files.
# Netlify serves EXACT files first — so per-route prerendered
# build/{route}/index.html files always win before the fallback fires.

# Long-cache hashed static assets.
[[headers]]
  for = "/static/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Sensible security headers for a marketing site.
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options        = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy        = "strict-origin-when-cross-origin"
    Permissions-Policy     = "camera=(), microphone=(), geolocation=()"
