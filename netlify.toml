[build]
  # Repo is monorepo-style. React app lives in /frontend.
  base    = "frontend"
  command = "yarn install && yarn build && node scripts/strip-emergent.js && node scripts/prerender-og.js"
  publish = "build"

[build.environment]
  NODE_VERSION            = "20"
  # CRA/craco: don't fail the build on ESLint warnings-treated-as-errors.
  CI                      = "false"
  DISABLE_ESLINT_PLUGIN   = "true"
  ESLINT_NO_DEV_ERRORS    = "true"
  TSC_COMPILE_ON_ERROR    = "true"
  # Support React 19 peer deps if any tool falls back to npm.
  NPM_FLAGS               = "--legacy-peer-deps"
  # Skip source maps in production.
  GENERATE_SOURCEMAP      = "false"
  # Skip the Netlify Next.js plugin auto-attach on this CRA project.
  NETLIFY_USE_YARN        = "true"

# SPA fallback — every unknown path serves index.html so React Router can
# handle client-side routes like /work/manufacturing-performance.
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200

# Long-cache hashed static assets.
[[headers]]
  for = "/static/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Sensible security headers for a marketing site.
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options        = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy        = "strict-origin-when-cross-origin"
    Permissions-Policy     = "camera=(), microphone=(), geolocation=()"
